name: Deploy Mini Program

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout via SSH
        run: |
          # Clean workspace if it has stale content
          if [ -d .git ] && git rev-parse --git-dir &>/dev/null; then
            git fetch origin
            git reset --hard origin/main
          else
            rm -rf ./* 2>/dev/null
            rm -rf ./.[!.]* 2>/dev/null
            git clone git@github.com:${{ github.repository }}.git .
          fi

      - name: Check Node.js
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci

      - name: Validate code
        run: |
          echo "$WECHAT_CI_KEY" > ./private.key
          npm run ci:validate
        env:
          WECHAT_CI_KEY_PATH: ./private.key
          WECHAT_CI_KEY: ${{ secrets.WECHAT_CI_KEY }}

      - name: Upload to WeChat
        run: npm run ci:upload
        env:
          WECHAT_CI_KEY_PATH: ./private.key
          WECHAT_CI_KEY: ${{ secrets.WECHAT_CI_KEY }}
          WECHAT_CI_VERSION: ${{ github.run_number }}
          WECHAT_CI_DESC: "CI build #${{ github.run_number }}"
